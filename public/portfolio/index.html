<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LinkedIn Recommendations</title>
	<link href="https://fonts.googleapis.com/css2?family=Aptos&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			padding: 20px;
			font-family: 'Aptos', sans-serif;
			background: #f5f5f5;
		}

		.recommendation {
			background: white;
			border-radius: 8px;
			box-shadow: 0 4px 6px rgba(0,0,0,0.1);
			padding: 20px;
			margin-bottom: 16px;
		}

			.recommendation img {
				width: 50px;
				height: 50px;
				border-radius: 50%;
			}

		.profile {
			display: flex;
			align-items: center;
			margin-bottom: 10px;
		}

		.profile-info {
			margin-left: 10px;
		}

		.profile-name {
			font-size: 20px;
			color: #0073b1;
			text-decoration: none;
		}

			.profile-name:hover {
				text-decoration: underline;
			}

		.recommendation-text {
			font-size: 16px;
			color: #666;
		}
	</style>
</head>
<body>
	<div id="recommendationsContainer"></div>
	<script>
		const recommendations = [
			{
				"name": "Gregg Boalch FACS CP",
				"profile_link": "https://www.linkedin.com/in/greggboalch",
				"profile_image": "https://media.licdn.com/dms/image/v2/D5603AQE0WsG1KZOQmw/profile-displayphoto-shrink_100_100/0/1658988164979?e=1736985600&v=beta&t=e11UajrFx08VYgOFARY0Nx_mhqHwDN5lU27-rL3GygY",
				"recommendation": "Peter was part of my team at Quantum when I was Product Manager for InPlace. He fulfilled the role of bridging the Business Analysts with the Development team - a challenging role at times. He had the rare gift of comprehending the end users' needs and translating them into achievable robust problem solution specifications, and to ensure the solution met or exceeded the customer's expectations while being a supportive team player along the way. He was a valued member of my team."
			},
			{
				"name": "Christopher R.",
				"profile_link": "https://www.linkedin.com/in/christopher-r-43a69634",
				"profile_image": "https://widgets.sociablekit.com/images/li-default.png",
				"recommendation": "Peter and I worked together at Sonic Healthcare. In our interactions, I found Peter to be knowledgeable, proactive and always advancing his skills. He is very knowledgeable in the areas of web applications and CRMs, SEO and digital strategy. Peter is also up to date on good software development and delivery processes. In my dealings with him, I've always found he is a reliable and friendly team member."
			},
			{
				"name": "Jonah Wigley",
				"profile_link": "https://www.linkedin.com/in/jonahwigley",
				"profile_image": "https://media.licdn.com/dms/image/v2/C5603AQGVljJboYYeoQ/profile-displayphoto-shrink_100_100/0/1646364857584?e=1736985600&v=beta&t=5fliclq3GiVIOAsGbj2lq20MvILXwxnx86yFhxtV_ZI",
				"recommendation": "I worked with Peter at Sonic Healthcare where he lead the project for Sonic Clinical Services websites. Peter was excellent to work with, very responsive, proactive and approachable. During our time working together, I found that he would always do his best to think outside to find solutions that would benefit not only his team but other teams also. I would love to work with him again."
			}
		];

		const container = document.getElementById('recommendationsContainer');

		recommendations.forEach(item => {
			const recElement = document.createElement('div');
			recElement.classList.add('recommendation');

			recElement.innerHTML = `
					<div class="profile">
						<img src="${item.profile_image}" alt="Profile image of ${item.name}">
						<div class="profile-info">
							<a href="${item.profile_link}" target="_blank" class="profile-name">${item.name}</a>
						</div>
					</div>
					<p class="recommendation-text">${item.recommendation}</p>
				`;

			container.appendChild(recElement);
		});
	</script>
</body>
</html>
